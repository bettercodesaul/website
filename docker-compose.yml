  #   restart: unless-stopped
  #   environment:
  #     - POSTGRES_DB=${DB_NAME:-bcs}
  #     - POSTGRES_USER=${DB_USER:-bcs}
  #     - POSTGRES_PASSWORD=${DB_PASSWORD}
  #   volumes:
  #     - db-data:/var/lib/postgresql/data
  #   networks:
  #     - bcs-network
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-bcs}"]
  #     interval: 10s
